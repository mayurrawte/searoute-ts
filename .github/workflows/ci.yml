name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  library:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm test

  demo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/web-demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/web-demo/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
